name: Ruff Format Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ruff-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3

      - name: Check formatting
        run: ruff format --check .
